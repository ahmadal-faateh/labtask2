<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Kanban Style Task Manager</title>
</head>
<body>
	<header>
        <h1>Task Manager</h1>

        <span id="taskCounter">Task: 0</span>

        <select id="priorityFilter">
            <option value="all">All Priorities</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>
    </header>

    <main>

        <section id="todo">
            <h2>To Do</h2>
            <ul class="taskList"></ul>
            <button class="addTaskBtn">+ Add Task</button>
        </section>

        <section id="inprogress">
            <h2>In Progress</h2>
            <ul class="taskList"></ul>
            <button class="addTaskBtn">+ Add Task</button>
        </section>

        <section id="done">
            <h2>Done</h2>
            <ul class="taskList"></ul>
            <button class="addTaskBtn">+ Add Task</button>
        </section>

    </main>
    <div id="taskModal" class="hidden">
        <div class="modalContent">

            <h2>Add New Task</h2>
            <input type="text" id="taskTitle" placeholder="Task Title">
            <textarea id="taskDescription" placeholder="Task Description"></textarea>
            <select id="taskPriority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <input type="date" id="taskDueDate">
            <div class="modalButton">
            	<button id="saveTask">Save</button>
            	<button id="cancelTask">Cancel</button>
            </div>
        </div>
    </div>
	
</body>
</html>
